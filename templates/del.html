<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Удаление книги | Библиотека</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 16px;
        }

        .content {
            padding: 30px;
        }

        .search-section {
            margin-bottom: 30px;
        }

        .search-box {
            display: flex;
            gap: 10px;
            background: #f5f5f5;
            border-radius: 12px;
            padding: 5px;
        }

        .search-box input {
            flex: 1;
            border: none;
            background: transparent;
            padding: 12px 20px;
            font-size: 16px;
            outline: none;
        }

        .search-box button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }

        .search-box button:hover {
            background: #5a67d8;
            transform: scale(1.02);
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-icon {
            font-size: 30px;
            color: #667eea;
            margin-bottom: 10px;
        }

        .stat-number {
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }

        .stat-label {
            color: #666;
            font-size: 14px;
        }

        .books-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
            max-height: 400px;
            overflow-y: auto;
            padding-right: 10px;
        }

        .books-list::-webkit-scrollbar {
            width: 8px;
        }

        .books-list::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        .books-list::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 10px;
        }

        .books-list::-webkit-scrollbar-thumb:hover {
            background: #555;
        }

        .book-card {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 15px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            transition: all 0.3s ease;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .book-card:hover {
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            transform: translateX(5px);
            border-color: #667eea;
        }

        .book-card.deleted {
            animation: slideOut 0.5s ease forwards;
        }

        @keyframes slideOut {
            to {
                opacity: 0;
                transform: translateX(100px);
            }
        }

        .book-cover {
            width: 80px;
            height: 100px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 30px;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .book-info {
            flex: 1;
        }

        .book-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }

        .book-author {
            color: #666;
            font-size: 14px;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .delete-btn {
            background: linear-gradient(135deg, #ff6b6b, #ee5253);
            color: white;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(238, 82, 83, 0.3);
        }

        .delete-btn:hover {
            transform: scale(1.1) rotate(90deg);
            box-shadow: 0 6px 20px rgba(238, 82, 83, 0.5);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            animation: fadeIn 0.3s ease;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            max-width: 400px;
            width: 90%;
            text-align: center;
            animation: slideUp 0.3s ease;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-icon {
            font-size: 60px;
            color: #ff6b6b;
            margin-bottom: 20px;
        }

        .modal h2 {
            color: #333;
            margin-bottom: 10px;
        }

        .modal p {
            color: #666;
            margin-bottom: 20px;
        }

        .modal-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .modal-btn {
            padding: 12px 30px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }

        .modal-btn.confirm {
            background: #ff6b6b;
            color: white;
        }

        .modal-btn.confirm:hover {
            background: #ee5253;
            transform: scale(1.05);
        }

        .modal-btn.cancel {
            background: #e0e0e0;
            color: #333;
        }

        .modal-btn.cancel:hover {
            background: #d0d0d0;
            transform: scale(1.05);
        }

        .notification {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: white;
            border-radius: 12px;
            padding: 15px 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            gap: 15px;
            animation: slideInRight 0.3s ease;
            z-index: 1001;
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(100px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .notification.success {
            border-left: 4px solid #48c774;
        }

        .notification.error {
            border-left: 4px solid #ff6b6b;
        }

        .notification i {
            font-size: 24px;
        }

        .notification.success i {
            color: #48c774;
        }

        .notification.error i {
            color: #ff6b6b;
        }

        .notification-message {
            color: #333;
            font-size: 14px;
        }

        .notification-close {
            background: none;
            border: none;
            color: #999;
            cursor: pointer;
            font-size: 18px;
            transition: color 0.3s ease;
        }

        .notification-close:hover {
            color: #333;
        }

        .select-all {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .select-all input {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .select-all label {
            color: #333;
            cursor: pointer;
            flex: 1;
        }

        .delete-selected {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: all 0.3s ease;
        }

        .delete-selected:hover {
            background: #ee5253;
        }

        .delete-selected:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .empty-state {
            text-align: center;
            padding: 50px 20px;
            background: #f8f9fa;
            border-radius: 15px;
        }

        .empty-state i {
            font-size: 60px;
            color: #ccc;
            margin-bottom: 20px;
        }

        .empty-state h3 {
            color: #333;
            margin-bottom: 10px;
        }

        .empty-state p {
            color: #666;
        }

        .back-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .back-btn:hover {
            background: #5a67d8;
            transform: scale(1.02);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>
                <i class="fas fa-book"></i>
                Управление книгами
            </h1>
            <p>Выберите книги для удаления из библиотеки</p>
        </div>

        <div class="content">
            <div class="search-section">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Поиск по названию или автору...">
                    <button onclick="searchBooks()">
                        <i class="fas fa-search"></i>
                        Поиск
                    </button>
                </div>
            </div>

            <div class="stats">
                <div class="stat-card">
                    <div class="stat-icon">
                        <i class="fas fa-book"></i>
                    </div>
                    <div class="stat-number" id="totalBooks">0</div>
                    <div class="stat-label">Всего книг</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">
                        <i class="fas fa-user"></i>
                    </div>
                    <div class="stat-number" id="totalAuthors">0</div>
                    <div class="stat-label">Авторов</div>
                </div>
            </div>

            <div class="select-all">
                <input type="checkbox" id="selectAllCheckbox" onchange="toggleSelectAll()">
                <label for="selectAllCheckbox">Выбрать все книги</label>
                <button class="delete-selected" onclick="deleteSelectedBooks()" id="deleteSelectedBtn" disabled>
                    <i class="fas fa-trash"></i>
                    Удалить выбранные
                </button>
            </div>

            <div class="books-list" id="booksList"></div>

            <div style="text-align: center; margin-top: 30px;">
                <a href="/" class="back-btn">
                    <i class="fas fa-arrow-left"></i>
                    Вернуться в библиотеку
                </a>
            </div>
        </div>
    </div>

    <div class="modal" id="confirmModal">
        <div class="modal-content">
            <div class="modal-icon">
                <i class="fas fa-exclamation-triangle"></i>
            </div>
            <h2>Подтверждение удаления</h2>
            <p id="modalMessage">Вы уверены, что хотите удалить эту книгу?</p>
            <div class="modal-buttons">
                <button class="modal-btn confirm" onclick="confirmDelete()">
                    <i class="fas fa-trash"></i>
                    Удалить
                </button>
                <button class="modal-btn cancel" onclick="closeModal()">
                    <i class="fas fa-times"></i>
                    Отмена
                </button>
            </div>
        </div>
    </div>

    <div id="notification" class="notification" style="display: none;"></div>

    <script>
        let books = [];
        let selectedBooks = new Set();
        let bookToDelete = null;

        document.addEventListener('DOMContentLoaded', function() {
            loadBooks();
        });

        async function loadBooks() {
            try {
                const response = await fetch('/api/books');
                books = await response.json();
                displayBooks();
                updateStats();
            } catch (error) {
                showNotification('Ошибка при загрузке книг', 'error');
            }
        }

        function displayBooks() {
            const booksList = document.getElementById('booksList');
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();

            let filteredBooks = books;

            if (searchTerm) {
                filteredBooks = filteredBooks.filter(book =>
                    book.title.toLowerCase().includes(searchTerm) ||
                    book.author.toLowerCase().includes(searchTerm)
                );
            }

            if (filteredBooks.length === 0) {
                booksList.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-book-open"></i>
                        <h3>Книги не найдены</h3>
                        <p>Попробуйте изменить параметры поиска</p>
                    </div>
                `;
                return;
            }

            booksList.innerHTML = filteredBooks.map(book => `
                <div class="book-card" id="book-${book.id}">
                    <div class="book-cover">
                        <i class="fas fa-book"></i>
                    </div>
                    <div class="book-info">
                        <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 5px;">
                            <input type="checkbox" onchange="toggleBookSelection(${book.id})" ${selectedBooks.has(book.id) ? 'checked' : ''}>
                            <div class="book-title">${book.title}</div>
                        </div>
                        <div class="book-author">
                            <i class="fas fa-user"></i>
                            ${book.author}
                        </div>
                    </div>
                    <button class="delete-btn" onclick="openDeleteModal(${book.id})">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
            `).join('');

            updateSelectAllCheckbox();
        }

        function updateStats() {
            document.getElementById('totalBooks').textContent = books.length;
            const uniqueAuthors = new Set(books.map(book => book.author)).size;
            document.getElementById('totalAuthors').textContent = uniqueAuthors;
        }

        function searchBooks() {
            displayBooks();
        }

        function toggleBookSelection(bookId) {
            if (selectedBooks.has(bookId)) {
                selectedBooks.delete(bookId);
            } else {
                selectedBooks.add(bookId);
            }
            updateDeleteSelectedButton();
            updateSelectAllCheckbox();
        }

        function toggleSelectAll() {
            const selectAllCheckbox = document.getElementById('selectAllCheckbox');
            if (selectAllCheckbox.checked) {
                books.forEach(book => selectedBooks.add(book.id));
            } else {
                selectedBooks.clear();
            }
            displayBooks();
            updateDeleteSelectedButton();
        }

        function updateSelectAllCheckbox() {
            const selectAllCheckbox = document.getElementById('selectAllCheckbox');
            selectAllCheckbox.checked = selectedBooks.size === books.length && books.length > 0;
        }

        function updateDeleteSelectedButton() {
            const deleteSelectedBtn = document.getElementById('deleteSelectedBtn');
            deleteSelectedBtn.disabled = selectedBooks.size === 0;
        }

        async function deleteSelectedBooks() {
            if (selectedBooks.size === 0) return;

            bookToDelete = Array.from(selectedBooks);
            document.getElementById('modalMessage').textContent = `Вы уверены, что хотите удалить ${selectedBooks.size} книг?`;
            document.getElementById('confirmModal').classList.add('active');
        }

        function openDeleteModal(bookId) {
            bookToDelete = bookId;
            const book = books.find(b => b.id === bookId);
            document.getElementById('modalMessage').textContent = `Вы уверены, что хотите удалить книгу "${book.title}"?`;
            document.getElementById('confirmModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('confirmModal').classList.remove('active');
            bookToDelete = null;
        }

        async function confirmDelete() {
            try {
                if (Array.isArray(bookToDelete)) {
                    const response = await fetch('/api/books', {
                        method: 'DELETE',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({ book_ids: bookToDelete })
                    });

                    if (response.ok) {
                        books = books.filter(book => !bookToDelete.includes(book.id));
                        selectedBooks.clear();
                        showNotification(`Успешно удалено ${bookToDelete.length} книг`, 'success');
                    }
                } else {
                    const response = await fetch(`/api/books/${bookToDelete}`, {
                        method: 'DELETE'
                    });

                    if (response.ok) {
                        const bookElement = document.getElementById(`book-${bookToDelete}`);
                        bookElement.classList.add('deleted');

                        setTimeout(() => {
                            books = books.filter(book => book.id !== bookToDelete);
                            selectedBooks.delete(bookToDelete);
                            displayBooks();
                            showNotification('Книга успешно удалена', 'success');
                        }, 500);
                    }
                }

                closeModal();
                updateStats();
                updateDeleteSelectedButton();
            } catch (error) {
                showNotification('Ошибка при удалении', 'error');
                closeModal();
            }
        }

        function showNotification(message, type) {
            const notification = document.getElementById('notification');
            notification.style.display = 'flex';
            notification.className = `notification ${type}`;
            notification.innerHTML = `
                <i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i>
                <span class="notification-message">${message}</span>
                <button class="notification-close" onclick="closeNotification()">
                    <i class="fas fa-times"></i>
                </button>
            `;

            setTimeout(() => {
                closeNotification();
            }, 3000);
        }

        function closeNotification() {
            const notification = document.getElementById('notification');
            notification.style.display = 'none';
        }

        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                searchBooks();
            }
        });
    </script>
</body>
</html>
